version: "3.9"

services:
  api:
    build: .
    container_name: opsiq-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - opsiq-db:/tmp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  opsiq-db:
